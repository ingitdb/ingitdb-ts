name: CI & Publish

on:
  push:
    branches: [ main ]
  pull_request:
  release:
    types: [ published ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests (without coverage to avoid dist resolution issues)
        run: |
          pnpm --filter @ingitdb/client run test:run
          pnpm --filter @ingitdb/client-github run test:run

      - name: Build
        run: pnpm build

      - name: Publish to NPM
        if: github.event_name == 'release'
        # --no-git-checks was removed: in a release workflow triggered by a git tag,
        # the working tree should always be clean. Removing the flag restores this safety check.
        run: pnpm -r publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
