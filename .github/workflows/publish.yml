name: CI & Publish

on:
  push:
    branches: [ main ]
  pull_request:
  release:
    types: [ published ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: |
          pnpm --filter @ingitdb/client run test:run -- --coverage
          pnpm --filter @ingitdb/client-github run test:run -- --coverage

      - name: Build
        run: pnpm build

      - name: Upload coverage (@ingitdb/client) to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: packages/client/coverage/lcov.info
          flag-name: client
          parallel: true

      - name: Upload coverage (@ingitdb/client-github) to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: packages/client-github/coverage/lcov.info
          flag-name: client-github
          parallel: true

      - name: Coveralls Finished
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          parallel-finished: true

      - name: Publish to NPM
        if: github.event_name == 'release'
        # --no-git-checks was removed: in a release workflow triggered by a git tag,
        # the working tree should always be clean. Removing the flag restores this safety check.
        run: pnpm -r publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
